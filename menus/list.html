<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <script>(function(){try{var t=localStorage.getItem("cafe.theme");if(t==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메뉴 - H-cafe</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="list.css" />
</head>
<body>
  <header class="site-header glass">
    <div class="container header-inner">
      <a href="../index" class="logo"><span class="logo-icon">☕</span> H-cafe</a>
      <nav class="header-nav">
        <button type="button" class="theme-toggle" aria-label="다크 모드로 전환">🌙</button>
        <a href="../basket/list" class="cart-link">
          🛒 장바구니
          <span id="cart-count" class="cart-badge">0</span>
        </a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1 class="page-title">메뉴</h1>

    <div class="search-wrap">
      <input
        type="search"
        id="menu-search"
        class="search-input"
        placeholder="메뉴 이름이나 카테고리로 검색"
        autocomplete="off"
      />
      <div id="search-suggestions" class="search-suggestions" hidden></div>
    </div>

    <section id="recent-section" class="recent-section" hidden>
      <h2 class="recent-title">최근 본 메뉴</h2>
      <div id="recent-scroll" class="recent-scroll"></div>
    </section>

    <div id="category-tabs" class="category-tabs"></div>

    <div id="menu-grid" class="menu-grid"></div>
  </main>

  <script src="../js/data.js"></script>
  <script src="../js/utils.js"></script>
  <script src="list.js"></script>
</body>
</html>
