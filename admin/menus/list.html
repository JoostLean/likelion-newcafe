<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>메뉴 관리 · 관리자</title>
    <link rel="stylesheet" href="../../css/variables.css" />
    <link rel="stylesheet" href="list.css" />
  </head>
  <body>
    <header class="admin-header glass">
      <div class="container admin-header__inner">
        <div class="admin-header__brand">
          <span class="admin-header__logo">🔴 관리자</span>
          <span class="admin-header__page">메뉴 관리</span>
        </div>
        <nav class="admin-header__nav">
          <a href="../index" class="admin-header__link">대시보드</a>
          <a href="list" class="admin-header__link is-active">메뉴</a>
          <a href="../orders/list" class="admin-header__link">주문</a>
        </nav>
      </div>
    </header>

    <main class="container admin-main">
      <div class="menus-toolbar">
        <div class="menus-toolbar__info">
          <h1 class="menus-toolbar__title">메뉴 목록</h1>
          <p class="menus-toolbar__count text-muted">
            총 <strong id="menu-count">0</strong>개
          </p>
        </div>
        <a href="create" class="btn btn-primary">+ 메뉴 추가</a>
      </div>

      <div class="menus-filter" id="category-filter">
        <!-- 카테고리 탭 (JS 렌더링) -->
      </div>

      <div class="menus-grid" id="menus-grid">
        <!-- 메뉴 카드 (JS 렌더링) -->
      </div>

      <p class="menus-empty" id="menus-empty" hidden>
        표시할 메뉴가 없습니다.
      </p>
    </main>

    <script src="../../js/data.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="list.js"></script>
  </body>
</html>
