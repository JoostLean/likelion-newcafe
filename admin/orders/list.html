<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <script>(function(){try{var t=localStorage.getItem("cafe.theme");if(t==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}})();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>주문 관리 · 관리자</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="../../css/variables.css" />
    <link rel="stylesheet" href="list.css" />
  </head>
  <body>
    <header class="admin-header glass">
      <div class="container admin-header__inner">
        <div class="admin-header__brand">
          <span class="admin-header__logo">🔴 관리자</span>
          <span class="admin-header__page">주문 관리</span>
        </div>
        <nav class="admin-header__nav">
          <a href="../index" class="admin-header__link">대시보드</a>
          <a href="../menus/list" class="admin-header__link">메뉴</a>
          <a href="list" class="admin-header__link is-active">주문</a>
          <button type="button" class="theme-toggle" aria-label="다크 모드로 전환">🌙</button>
          <a href="../../index.html" class="admin-header__link admin-header__link--exit">🏠<span class="admin-header__link-label"> 고객 화면</span></a>
        </nav>
      </div>
    </header>

    <main class="container admin-main">
      <div class="orders-toolbar">
        <div class="orders-toolbar__info">
          <h1 class="orders-toolbar__title">주문 관리</h1>
          <p class="orders-toolbar__count text-muted">
            총 <strong id="order-count">0</strong>건
          </p>
        </div>
      </div>

      <div class="orders-filter" id="status-filter">
        <!-- 상태 필터 탭 (JS 렌더링) -->
      </div>

      <div class="orders-list" id="orders-list">
        <!-- 주문 목록 (JS 렌더링) -->
      </div>

      <p class="orders-empty" id="orders-empty" hidden>
        표시할 주문이 없습니다.
      </p>
    </main>

    <script src="../../js/data.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="list.js"></script>
  </body>
</html>
