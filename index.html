<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>H-cafe</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <header class="site-header glass">
    <div class="container header-inner">
      <a href="index.html" class="logo"><span class="logo-icon">☕</span> H-cafe</a>
      <nav class="header-nav">
        <a href="my/index.html" class="my-link">마이페이지</a>
        <button type="button" id="admin-link" class="admin-link">관리자</button>
        <a href="basket/list.html" class="cart-link">
          🛒 장바구니
          <span id="cart-count" class="cart-badge">0</span>
        </a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container hero-inner">
        <p class="hero-eyebrow">Urban &amp; Minimal</p>
        <h1 class="hero-title">향긋한 한 잔의 여유,<br />H-cafe에서 만나요</h1>
        <p class="hero-desc">직접 로스팅한 원두와 정성스러운 디저트를 만나보세요.</p>
        <a href="menus/list.html" class="btn btn-primary hero-cta">메뉴 보러가기</a>
      </div>
    </section>

    <section class="container section">
      <div class="section-head">
        <h2 class="section-title">카테고리</h2>
      </div>
      <div id="category-grid" class="category-grid"></div>
    </section>

    <section class="container section">
      <div class="section-head">
        <h2 class="section-title">인기 메뉴</h2>
        <a href="menus/list.html" class="section-more">전체보기 →</a>
      </div>
      <div id="popular-grid" class="popular-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="text-muted">☕ H-cafe · 오늘도 좋은 하루 되세요</p>
    </div>
  </footer>

  <div id="admin-auth-modal" class="modal-overlay" hidden>
    <div class="modal card">
      <h2 class="modal-title">관리자 인증</h2>
      <p class="modal-desc text-muted">비밀번호를 입력해주세요.</p>
      <form id="admin-auth-form">
        <input
          type="password"
          id="admin-password"
          class="modal-input"
          placeholder="••••"
          inputmode="numeric"
          autocomplete="off"
        />
        <div class="modal-actions">
          <button type="button" id="admin-auth-cancel" class="btn btn-ghost">취소</button>
          <button type="submit" class="btn btn-primary">확인</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="index.js"></script>
</body>
</html>
