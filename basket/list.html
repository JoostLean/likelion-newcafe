<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <script>(function(){try{var t=localStorage.getItem("cafe.theme");if(t==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장바구니 - H-cafe</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="list.css" />
</head>
<body>
  <header class="site-header glass">
    <div class="container header-inner">
      <a href="../index" class="logo"><span class="logo-icon">☕</span> H-cafe</a>
      <nav class="header-nav">
        <button type="button" class="theme-toggle" aria-label="다크 모드로 전환">🌙</button>
        <a href="../basket/list" class="cart-link">
          🛒 장바구니
          <span id="cart-count" class="cart-badge">0</span>
        </a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1 class="page-title">장바구니</h1>

    <div id="basket-list" class="basket-list"></div>

    <div id="basket-summary" class="basket-summary card"></div>
  </main>

  <!--
    결제 수단 선택 모달
    ⚠️ 실제 PG(결제대행사) 연동이 아닌 UI/UX 시뮬레이션(mock)입니다.
  -->
  <div id="payment-modal" class="modal-overlay" hidden>
    <div class="modal card">
      <button type="button" id="payment-modal-close" class="modal-close" aria-label="닫기">✕</button>

      <div class="payment-step" data-step="select" id="payment-step-select">
        <h2 class="modal-title">결제 수단 선택</h2>
        <p class="modal-desc text-muted">
          결제 금액 <strong id="payment-total"></strong>을 어떤 수단으로 결제할까요?
        </p>
        <div class="payment-method-grid" id="payment-method-grid"></div>
      </div>

      <div class="payment-step" data-step="card" id="payment-step-card" hidden>
        <button type="button" id="payment-card-back" class="payment-back-link">← 결제 수단 선택으로</button>
        <h2 class="modal-title">신용카드 정보 입력</h2>
        <p class="modal-desc text-muted">실제 결제가 이루어지지 않는 데모 화면입니다.</p>
        <form id="payment-card-form" class="payment-card-form">
          <label class="payment-field">
            <span class="payment-field-label">카드번호</span>
            <input
              type="text"
              id="card-number"
              inputmode="numeric"
              maxlength="19"
              placeholder="0000 0000 0000 0000"
              autocomplete="off"
              required
            />
          </label>
          <div class="payment-field-row">
            <label class="payment-field">
              <span class="payment-field-label">유효기간</span>
              <input
                type="text"
                id="card-expiry"
                inputmode="numeric"
                maxlength="5"
                placeholder="MM/YY"
                autocomplete="off"
                required
              />
            </label>
            <label class="payment-field">
              <span class="payment-field-label">CVC</span>
              <input
                type="text"
                id="card-cvc"
                inputmode="numeric"
                maxlength="3"
                placeholder="000"
                autocomplete="off"
                required
              />
            </label>
          </div>
          <button type="submit" class="btn btn-primary payment-submit-btn">결제하기</button>
        </form>
      </div>

      <div class="payment-step payment-step--processing" data-step="processing" id="payment-step-processing" hidden>
        <div class="payment-spinner"></div>
        <p class="payment-processing-text" id="payment-processing-text">결제 중...</p>
      </div>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/utils.js"></script>
  <script src="list.js"></script>
</body>
</html>
